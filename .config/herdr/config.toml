onboarding = false

# ─── Keys ──────────────────────────────────────────────────────────────────
# Prefix 保持 ctrl+b（herdr 默认），避免占用 zsh 的 Ctrl+A 行首。
# 也跟 tmux 默认 prefix 一致；嵌套 tmux 时按两次 Ctrl+B 透传到内层。
[keys]
prefix = "ctrl+b"

# workspace 翻页（herdr 默认未启用）
switch_workspace = ["ctrl+alt+1..9"]
previous_workspace = "prefix+["
next_workspace     = "prefix+]"

# 释放/迁移会跟我们冲突的默认绑定
copy_mode        = ""                 # 默认占 prefix+[，让给 previous_workspace
toggle_sidebar   = ""                 # 默认占 prefix+b，让给 last_pane（如需用 sidebar 走鼠标/菜单）
close_workspace  = ""                 # 默认占 prefix+shift+d，让给 split_horizontal（关 workspace 走菜单/CLI）
close_tab        = ""                 # 默认占 prefix+shift+x，避免后续冲突；用 prefix+x 关单 pane 即可

# pane
toggle_floating_pane = ["prefix+f", "alt+f"]
cycle_pane_next = ["prefix+tab", "alt+]"]
cycle_pane_previous = ["prefix+shift+tab", "alt+["]
last_pane = "prefix+b"

# pane focus：补齐 zellij Ctrl+Alt+h/j/k/l
focus_pane_left  = ["prefix+h", "ctrl+alt+h"]
focus_pane_down  = ["prefix+j", "ctrl+alt+j"]
focus_pane_up    = ["prefix+k", "ctrl+alt+k"]
focus_pane_right = ["prefix+l", "ctrl+alt+l"]

split_vertical   = ["prefix+d", "alt+n"]          # 向右切（竖直分隔线）
split_horizontal = ["prefix+shift+d", "alt+N"]    # 向下切


# zellij-like modes
edit_scrollback = ["prefix+e", "alt+s"]
resize_mode     = ["prefix+r", "alt+m"]

# tab 切换：prefix+1..9，与 Alt+1..9 (tmux/zellij) 同手感
switch_tab       = "prefix+1..9"
new_tab          = ["prefix+c", "ctrl+alt+t"]
# previous_tab = "prefix+p"
# next_tab = "prefix+n"

# next_agent = ["prefix+a"]
# previous_agent = ["prefix+A"]

# agent 聚焦：prefix+alt+1..9，避免占用 1..9 直达
focus_agent = ["alt+1..9"]

goto = ["prefix+g", "alt+g"]

# 常用应用直达；避开 herdr 默认的 prefix+g (goto)
[[keys.command]]
key  = "prefix+alt+g"
type = "pane"
command = "lazygit"

[[keys.command]]
key  = "prefix+alt+d"
type = "pane"
command = "lazydocker"

[[keys.command]]
key  = "prefix+alt+y"
type = "pane"
command = "yazi"

[terminal]
new_cwd = "follow"

 [theme]
name = "gruvbox"
# name = "terminal"

# ─── UI ────────────────────────────────────────────────────────────────────
[ui]
prompt_new_tab_name = false        # 新 tab 即出现，跟 Cmd+t 风格一致
accent = "cyan"
show_agent_labels_on_pane_borders = true
agent_panel_sort = "priority"

[ui.toast]
delivery = "herdr"

[ui.sound]
enabled = false

[ui.sidebar.spaces]
row_gap = 1

[session]
resume_agents_on_restore = true

[remote]
manage_ssh_config = true

# ─── Experimental ──────────────────────────────────────────────────────────
[experimental]
# server 重启后恢复 pane 屏幕历史（长跑 agent / nvim session 友好）
pane_history = true
# 中文输入法候选窗跟随焦点 pane 的光标（Claude Code / codex 等 TUI）
reveal_hidden_cursor_for_cjk_ime = true
# 本地 Kitty graphics 渲染（ghostty 兼容 Kitty graphics 协议）
kitty_graphics = true
switch_ascii_input_source_in_prefix = true
