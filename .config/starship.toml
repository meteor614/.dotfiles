"$schema" = "https://starship.rs/config-schema.json"

palette = "dotfiles"
add_newline = true
command_timeout = 1000

format = """
$os\
$directory\
$git_branch\
$git_status\
$line_break\
$character\
"""

right_format = """
$status\
$cmd_duration\
$jobs\
$direnv\
$nodejs\
$python\
$golang\
$rust\
$lua\
$package\
$docker_context\
$kubernetes\
$aws\
$gcloud\
$username\
$hostname\
"""

[palettes.dotfiles]
blue = "#7aa2f7"
cyan = "#7dcfff"
green = "#9ece6a"
orange = "#ff9e64"
red = "#f7768e"
surface = "#24283b"
text = "#c0caf5"
yellow = "#e0af68"

[os]
disabled = false
format = "[$symbol ]($style)"
style = "bold blue"

[os.symbols]
Macos = "´îé"

[directory]
format = "[$path]($style)[$read_only]($read_only_style) "
home_symbol = "~"
read_only = " ¾░î¥"
read_only_style = "bold red"
style = "bold cyan"
truncation_length = 3
truncation_symbol = "ÔÇª/"

[git_branch]
format = "[$symbol$branch]($style) "
style = "bold orange"
symbol = "´Éÿ "

[git_status]
format = "([$all_status$ahead_behind]($style) )"
style = "bold yellow"

[status]
disabled = false
format = "[$symbol$status]($style) "
map_symbol = true
style = "bold red"

[cmd_duration]
format = "[¾▒Ä½ $duration]($style) "
min_time = 800
style = "bold yellow"

[jobs]
format = "[$symbol$number]($style) "
number_threshold = 1
style = "bold blue"
symbol = "´Çô "

[direnv]
disabled = false
style = "bold green"

[nodejs]
format = "[$symbol$version]($style) "
style = "bold green"
symbol = "¯£ÿ "

[python]
format = "[$symbol$version]($style) "
style = "bold green"
symbol = "¯ÿå "

[golang]
format = "[$symbol$version]($style) "
style = "bold cyan"
symbol = "¯ÿº "

[rust]
format = "[$symbol$version]($style) "
style = "bold orange"
symbol = "¯×¿ "

[lua]
format = "[$symbol$version]($style) "
style = "bold blue"
symbol = "¯ÿá "

[package]
format = "[$symbol$version]($style) "
style = "bold text"
symbol = "¾░Åù "

[docker_context]
style = "bold blue"
symbol = "´îê "

[kubernetes]
disabled = false
style = "bold cyan"
symbol = "Ôÿ© "

[aws]
style = "bold orange"
symbol = "¯î¢ "

[gcloud]
style = "bold blue"
symbol = "¾▒çÂ "

[username]
format = "[$user]($style)@"
show_always = false
style_root = "bold red"
style_user = "bold green"

[hostname]
disabled = false
format = "[$hostname]($style) "
ssh_only = true
style = "bold green"

[character]
error_symbol = "[ÔØ»](bold red)"
success_symbol = "[ÔØ»](bold green)"
vimcmd_symbol = "[ÔØ«](bold yellow)"
vimcmd_replace_one_symbol = "[ÔØ«](bold yellow)"
vimcmd_replace_symbol = "[ÔØ«](bold yellow)"
vimcmd_visual_symbol = "[ÔØ«](bold yellow)"
