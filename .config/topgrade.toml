[misc]
# Run unattended and avoid steps that are managed elsewhere or too disruptive:
# - node: Node runtimes/packages are managed by mise/corepack/npm explicitly.
# - gem/ruby_gems: system Ruby can be too old/noisy; setup.sh handles needed gems.
# - containers: avoid implicit image/container updates and pruning side effects.
# - git_repos: this dotfiles repo uses jj; avoid Topgrade pulling arbitrary repos.
disable = ["node", "gem", "ruby_gems", "containers", "git_repos"]
assume_yes = true
